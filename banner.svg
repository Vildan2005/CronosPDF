<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50"/>
      <stop offset="100%" style="stop-color:#1a252f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C0392B"/>
      <stop offset="100%" style="stop-color:#962d22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="300" fill="url(#bg)"/>
  <rect x="0" y="0" width="900" height="4" fill="url(#accent)"/>
  <rect x="0" y="296" width="900" height="4" fill="url(#accent)"/>
  <!-- Document pages background -->
  <rect x="80" y="60" width="120" height="160" rx="4" fill="#34495e" stroke="#C0392B" stroke-width="2" opacity="0.5" transform="rotate(-8, 140, 140)"/>
  <rect x="95" y="55" width="120" height="160" rx="4" fill="#3d566e" stroke="#C0392B" stroke-width="2" opacity="0.7" transform="rotate(-3, 155, 135)"/>
  <rect x="110" y="50" width="120" height="160" rx="4" fill="#44637a" stroke="#C0392B" stroke-width="2"/>
  <!-- Document lines -->
  <line x1="125" y1="75" x2="215" y2="75" stroke="#8e9eab" stroke-width="2" opacity="0.6"/>
  <line x1="125" y1="90" x2="200" y2="90" stroke="#8e9eab" stroke-width="2" opacity="0.5"/>
  <line x1="125" y1="105" x2="210" y2="105" stroke="#8e9eab" stroke-width="2" opacity="0.4"/>
  <line x1="125" y1="120" x2="195" y2="120" stroke="#8e9eab" stroke-width="2" opacity="0.4"/>
  <line x1="125" y1="135" x2="205" y2="135" stroke="#8e9eab" stroke-width="2" opacity="0.3"/>
  <line x1="125" y1="150" x2="190" y2="150" stroke="#8e9eab" stroke-width="2" opacity="0.3"/>
  <!-- PDF badge on doc -->
  <rect x="160" y="170" width="50" height="25" rx="4" fill="#C0392B"/>
  <text x="185" y="187" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">PDF</text>
  <!-- Brand name -->
  <text x="340" y="130" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="white" filter="url(#glow)">CronosPDF</text>
  <text x="340" y="165" font-family="Arial, sans-serif" font-size="18" fill="#bdc3c7">Professional PDF Reader &amp; Editor</text>
  <!-- Feature pills -->
  <rect x="340" y="185" width="70" height="26" rx="13" fill="#C0392B" opacity="0.9"/>
  <text x="375" y="202" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">View</text>
  <rect x="420" y="185" width="80" height="26" rx="13" fill="#C0392B" opacity="0.8"/>
  <text x="460" y="202" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Annotate</text>
  <rect x="510" y="185" width="70" height="26" rx="13" fill="#C0392B" opacity="0.7"/>
  <text x="545" y="202" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Merge</text>
  <rect x="590" y="185" width="60" height="26" rx="13" fill="#C0392B" opacity="0.6"/>
  <text x="620" y="202" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">OCR</text>
  <rect x="660" y="185" width="80" height="26" rx="13" fill="#C0392B" opacity="0.5"/>
  <text x="700" y="202" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Convert</text>
  <!-- Decorative circles -->
  <circle cx="820" cy="60" r="30" fill="#C0392B" opacity="0.15"/>
  <circle cx="850" cy="90" r="20" fill="#C0392B" opacity="0.1"/>
  <circle cx="790" cy="240" r="40" fill="#C0392B" opacity="0.08"/>
  <!-- Version tag -->
  <rect x="340" y="230" width="90" height="24" rx="12" fill="none" stroke="#C0392B" stroke-width="1.5"/>
  <text x="385" y="246" font-family="Arial, sans-serif" font-size="11" fill="#C0392B" text-anchor="middle">v2.4.1</text>
</svg>